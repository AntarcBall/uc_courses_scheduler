name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure Pages source is gh-pages
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.request("POST /repos/{owner}/{repo}/pages", {
                owner,
                repo,
                source: { branch: "gh-pages", path: "/" },
              });
              core.info("Created GitHub Pages configuration.");
            } catch (err) {
              if (err.status === 409 || err.status === 422) {
                await github.request("PUT /repos/{owner}/{repo}/pages", {
                  owner,
                  repo,
                  source: { branch: "gh-pages", path: "/" },
                });
                core.info("Updated GitHub Pages source to gh-pages.");
              } else {
                core.warning(`Could not auto-configure Pages: ${err.message}`);
                throw err;
              }
            }

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
